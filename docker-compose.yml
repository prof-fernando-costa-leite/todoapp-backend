version: '3.9'
services:
  postgres:
    image: postgres:17-alpine
    container_name: todoapp-postgres
    environment:
      POSTGRES_DB: todoapp
      POSTGRES_USER: todoapp
      POSTGRES_PASSWORD: todoapp
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todoapp -d todoapp"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - todoapp-postgres-data:/var/lib/postgresql/data

volumes:
  todoapp-postgres-data:

